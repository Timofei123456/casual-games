spring:
  application:
    name: api-gateway

  config:
    import: optional:file:.env[.properties]

  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8083
          predicates:
            - Path=/user-service/**
          filters:
            - StripPrefix=1

        - id: security-service
          uri: http://localhost:8080
          predicates:
            - Path=/security-service/**
          filters:
            - StripPrefix=1

        - id: game-service
          uri: http://localhost:8082
          predicates:
            - Path=/game-service/**
          filters:
            - StripPrefix=1

        - id: websocket-service
          uri: http://localhost:8081
          predicates:
            - Path=/websocket-service/**
          filters:
            - StripPrefix=1

  security:
    jwt:
      secret: ${JWT_SECRET}


server:
  port: 8088
